name: 'FSESC Secret Scanner'
description: 'Ultra-fast secret scanner with heuristic local filtering.'
author: 'tripock'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  all:
    description: 'Show all detections (including low confidence ones)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      shell: bash

    - name: Install FSESC
      run: |
        npm run build
        npm install -g .
      shell: bash

    - name: Run FSESC
      run: |
        fsesc scan ${{ inputs.path }} \
          ${{ inputs.all == 'true' && '--all' || '' }}
      shell: bash
